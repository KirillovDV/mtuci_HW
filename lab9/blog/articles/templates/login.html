{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Django Public Blog - вход</title>
  <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body class="auth-page">
  <div class="header">
    <a class="all-posts" href="/">Все статьи</a>
    <img src="{% static 'img/cat.jpeg' %}" alt="Логотип блога">
  </div>

  <div class="content">
    <h1>Вход</h1>
    <form method="POST">{% csrf_token %}
      <input type="text" name="username" placeholder="Логин" value="{{ form.username }}">
      <input type="password" name="password" placeholder="Пароль" value="{{ form.password }}">
      <input type="submit" value="Войти">
    </form>
    <div class="errors">{{ form.errors }}</div>
    <a class="small-link" href="/register/">Регистрация</a>
  </div>
</body>
</html>
