{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Архив всех статей</title>
    <link rel="stylesheet" href="{% static 'css/index.css' %}">
</head>
<body>
<div class="header">
    <a class="all-posts" href="/">Все статьи</a>
    <img src="{% static 'img/cat.jpeg' %}" alt="Логотип блога">
    <h1 class="archive-title">Архив статей</h1>
</div>

<div class="archive">
    {% for post in posts %}
    <div class="one-post">
        <div class="one-post-shadow"></div>
        <h2 class="post-title">
            <a href="{% url 'get_article' article_id=post.id %}">{{ post.title }}</a>
        </h2>

        <div class="article-info">
            <div class="article-author">Автор: {{ post.author.username }}</div>
            <div class="article-created-date">Опубликовано: {{ post.created_date|date:"d.m.Y" }}</div>
        </div>

        <div class="article-text">{{ post.get_excerpt|linebreaks }}</div>

        <button type="button" class="fold-button">Свернуть</button>
        <a href="{% url 'get_article' article_id=post.id %}" class="read-more">Читать далее →</a>
    </div>
    {% endfor %}
</div>
<script src="{% static 'js/jquery.js' %}"></script>
<script src="{% static 'js/helloworld.js' %}"></script>
<script src="{% static 'js/highlight-post.js' %}"></script>
</body>
</html>
